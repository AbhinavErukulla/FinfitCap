name: All Tests & Allure Report

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Maven
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install dependencies
        run: |
          cd playwright-tests
          npm install
          cd ../cypress-api-tests
          npm install

      - name: Install Playwright browsers
        run: |
          cd playwright-tests
          npx playwright install --with-deps

      - name: Run Playwright tests
        run: |
          cd playwright-tests
          npx playwright test

      - name: Run Cypress tests
        run: |
          cd cypress-api-tests
          npx cypress run

      - name: Run Selenium tests
        run: |
          cd selenium-tests
          mvn test

      - name: Merge Allure results
        run: |
          mkdir combined-allure-results
          cp -r playwright-tests/allure-results/* combined-allure-results/ || true
          cp -r selenium-tests/target/allure-results/* combined-allure-results/ || true
          cp -r cypress-api-tests/allure-results/* combined-allure-results/ || true

      - name: Generate Allure report
        run: |
          npm install -g allure-commandline
          allure generate combined-allure-results --clean -o allure-report

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: combined-allure-results

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m 'Update test results and reports' || echo "No changes to commit"
          git push